{% extends "base.html" %}
{% block main %}
<section class="chat-app">
  <aside class="session-sidebar" aria-label="Chat history">
    <div class="session-sidebar-head">
      <a href="/">Fuzz Agent</a>
      <button id="new-session" type="button">New</button>
    </div>
    <div class="session-section-label">History</div>
    <nav id="session-list" class="session-list" aria-label="Previous sessions">
      <div class="session-empty">No sessions yet.</div>
    </nav>
  </aside>

  <section class="chat-workspace">
    <header class="topbar chat-topbar">
      <div class="chat-title">
        <a href="/">Campaigns</a>
        <h1>Command Chat</h1>
      </div>
      <div class="chat-meta">
        <div class="scope-pill" id="session-pill"><span>session</span><strong id="session-short">web</strong></div>
        <div class="scope-pill" id="chat-context"><span>scope</span><strong id="scope-short">global</strong></div>
      </div>
    </header>

    <div class="panel chat-panel">
      <div id="chat-log" class="chat-log" aria-live="polite">
        <div class="chat-empty" id="chat-empty">
          <span>ready</span>
          <strong>agent command channel</strong>
        </div>
      </div>
      <div class="command-strip" aria-label="Quick commands">
        <button type="button" data-command="status">status</button>
        <button type="button" data-command="trace">trace</button>
        <button type="button" data-command="triage">triage</button>
        <button type="button" data-command="help">help</button>
      </div>
      <div id="command-hints" class="command-hints" hidden></div>
      <form id="chat-form" class="chat-form">
        <label class="sr-only" for="chat-input">Message</label>
        <textarea id="chat-input" name="message" rows="1" autocomplete="off" autofocus
                  placeholder="Type a message or command"></textarea>
        <button id="chat-submit" type="submit">Send</button>
      </form>
    </div>
  </section>
</section>

<script>
const params = new URLSearchParams(window.location.search);
const initialCampaignId = params.get("campaign_id") || "";
const querySessionId = params.get("session_id") || "";
let currentCampaignId = initialCampaignId;
let currentSessionId = querySessionId
  || (initialCampaignId ? newSessionId() : localStorage.getItem("fuzz-agent-chat-session"))
  || newSessionId();
const log = document.getElementById("chat-log");
const form = document.getElementById("chat-form");
const input = document.getElementById("chat-input");
const submit = document.getElementById("chat-submit");
const context = document.getElementById("chat-context");
const scopeShort = document.getElementById("scope-short");
const sessionShort = document.getElementById("session-short");
const sessionList = document.getElementById("session-list");
const newSessionButton = document.getElementById("new-session");
const commandHints = document.getElementById("command-hints");
const commandChoices = [
  {value: "/status", label: "status", description: "current campaign status"},
  {value: "/trace", label: "trace", description: "recent agent decisions"},
  {value: "/triage", label: "triage", description: "crash triage summary"},
  {value: "/help", label: "help", description: "available commands"},
  {value: "/analyze ", label: "analyze", description: "inspect a target path"},
  {value: "/run ", label: "run", description: "start a fuzz campaign"},
];
const sentMessages = [];
let recallIndex = null;

function newSessionId() {
  return (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : `web-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function setCurrentSession(sessionId, campaignId) {
  currentSessionId = sessionId;
  currentCampaignId = campaignId || "";
  localStorage.setItem("fuzz-agent-chat-session", currentSessionId);
  sessionShort.textContent = currentSessionId.slice(0, 8);
  scopeShort.textContent = currentCampaignId || "global";
  context.innerHTML = "";
  const scope = document.createElement("span");
  scope.textContent = currentCampaignId ? "campaign" : "scope";
  const value = currentCampaignId ? document.createElement("a") : document.createElement("strong");
  if (currentCampaignId) {
    value.href = `/campaigns/${currentCampaignId}`;
  }
  value.textContent = currentCampaignId || "global";
  context.append(scope, value);
}

setCurrentSession(currentSessionId, currentCampaignId);

function showEmpty() {
  log.innerHTML = "";
  const empty = document.createElement("div");
  empty.className = "chat-empty";
  empty.id = "chat-empty";
  empty.innerHTML = "<span>ready</span><strong>agent command channel</strong>";
  log.appendChild(empty);
}

function addMessage(role, text) {
  const empty = document.getElementById("chat-empty");
  if (empty) empty.remove();
  const row = document.createElement("div");
  row.className = `chat-row ${role}`;
  const bubble = document.createElement("div");
  bubble.className = "chat-bubble";
  const tag = document.createElement("span");
  tag.className = "chat-role";
  tag.textContent = role === "user" ? "you" : "agent";
  const body = document.createElement("div");
  body.className = "chat-text";
  bubble.appendChild(tag);
  renderMessageText(body, text);
  bubble.appendChild(body);
  if (role !== "user") {
    bubble.appendChild(messageActions(text));
  }
  row.appendChild(bubble);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
}

function renderMessageText(target, text) {
  target.innerHTML = "";
  const fencePattern = /```(?:([A-Za-z0-9_-]+)\n)?([\s\S]*?)```/g;
  let index = 0;
  let match;
  while ((match = fencePattern.exec(text)) !== null) {
    appendPlainText(target, text.slice(index, match.index));
    const pre = document.createElement("pre");
    const code = document.createElement("code");
    if (match[1]) code.dataset.language = match[1];
    code.textContent = match[2].trimEnd();
    pre.appendChild(code);
    target.appendChild(pre);
    index = fencePattern.lastIndex;
  }
  appendPlainText(target, text.slice(index));
}

function appendPlainText(target, text) {
  if (!text) return;
  const block = document.createElement("div");
  block.className = "chat-plain";
  block.textContent = text.trim();
  target.appendChild(block);
}

function messageActions(text) {
  const actions = document.createElement("div");
  actions.className = "chat-actions";
  const copy = document.createElement("button");
  copy.type = "button";
  copy.textContent = "copy";
  copy.addEventListener("click", async () => {
    if (navigator.clipboard) {
      await navigator.clipboard.writeText(text);
    }
    copy.textContent = "copied";
    setTimeout(() => {
      copy.textContent = "copy";
    }, 1200);
  });
  actions.appendChild(copy);
  return actions;
}

function renderHistory(history) {
  showEmpty();
  if (!history || !history.length) return;
  log.innerHTML = "";
  history.forEach((turn) => addMessage(turn.role === "user" ? "user" : "assistant", turn.content));
}

function addBusy() {
  const row = document.createElement("div");
  row.className = "chat-row assistant busy";
  row.id = "chat-busy";
  const bubble = document.createElement("div");
  bubble.className = "chat-bubble";
  const tag = document.createElement("span");
  tag.className = "chat-role";
  tag.textContent = "agent";
  const body = document.createElement("div");
  body.className = "chat-text";
  body.textContent = "working";
  bubble.append(tag, body);
  row.appendChild(bubble);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
}

function clearBusy() {
  const row = document.getElementById("chat-busy");
  if (row) row.remove();
}

async function send(message) {
  addMessage("user", message);
  addBusy();
  submit.disabled = true;
  input.disabled = true;
  rememberMessage(message);
  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {"content-type": "application/json"},
      body: JSON.stringify({
        session_id: currentSessionId,
        campaign_id: currentCampaignId || null,
        message: normalizeCommand(message),
      }),
    });
    const data = await response.json();
    if (!response.ok) {
      throw new Error(data.detail || response.statusText);
    }
    clearBusy();
    setCurrentSession(data.session_id || currentSessionId, data.active_campaign_id || currentCampaignId);
    addMessage("assistant", data.reply || "");
    await loadSessions();
  } catch (error) {
    clearBusy();
    addMessage("assistant", `Failed: ${error.message || error}`);
  } finally {
    submit.disabled = false;
    input.disabled = false;
    input.focus();
  }
}

async function loadSessions() {
  const response = await fetch("/api/chat/sessions");
  const sessions = response.ok ? await response.json() : [];
  sessionList.innerHTML = "";
  if (!sessions.length) {
    const empty = document.createElement("div");
    empty.className = "session-empty";
    empty.textContent = "No sessions yet.";
    sessionList.appendChild(empty);
    return;
  }
  sessions.forEach((session) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "session-card";
    if (session.session_id === currentSessionId) {
      button.classList.add("active");
    }
    const title = document.createElement("strong");
    title.textContent = session.title || "New session";
    const meta = document.createElement("span");
    meta.textContent = sessionMeta(session);
    button.append(title, meta);
    button.addEventListener("click", () => loadSession(session.session_id));
    sessionList.appendChild(button);
  });
}

function sessionMeta(session) {
  const scope = session.active_campaign_id
    ? `campaign ${session.active_campaign_id}`
    : `${session.turn_count || 0} turns`;
  const recency = relativeTime(session.updated_at);
  return recency ? `${scope} · ${recency}` : scope;
}

function relativeTime(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "";
  const seconds = Math.max(0, Math.floor((Date.now() - date.getTime()) / 1000));
  if (seconds < 60) return "now";
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h`;
  return date.toLocaleDateString(undefined, {month: "short", day: "numeric"});
}

async function loadSession(sessionId) {
  const response = await fetch(`/api/chat/sessions/${sessionId}`);
  if (!response.ok) return;
  const session = await response.json();
  setCurrentSession(session.session_id, session.active_campaign_id || "");
  renderHistory(session.history || []);
  await loadSessions();
}

function startNewSession() {
  setCurrentSession(newSessionId(), initialCampaignId);
  showEmpty();
  loadSessions();
  input.focus();
}

function normalizeCommand(message) {
  return message.startsWith("/") ? message.slice(1).trimStart() : message;
}

function rememberMessage(message) {
  if (sentMessages[sentMessages.length - 1] !== message) {
    sentMessages.push(message);
  }
  recallIndex = null;
}

function autosizeInput() {
  input.style.height = "auto";
  input.style.height = `${Math.min(input.scrollHeight, 180)}px`;
}

function renderCommandHints() {
  const value = input.value.trim().toLowerCase();
  if (!value.startsWith("/")) {
    commandHints.hidden = true;
    commandHints.innerHTML = "";
    return;
  }
  const matches = commandChoices.filter((command) => command.value.startsWith(value)).slice(0, 4);
  commandHints.innerHTML = "";
  if (!matches.length) {
    commandHints.hidden = true;
    return;
  }
  matches.forEach((command) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "command-hint";
    const label = document.createElement("strong");
    label.textContent = command.label;
    const description = document.createElement("span");
    description.textContent = command.description;
    button.append(label, description);
    button.addEventListener("click", () => {
      input.value = command.value;
      autosizeInput();
      renderCommandHints();
      input.focus();
    });
    commandHints.appendChild(button);
  });
  commandHints.hidden = false;
}

form.addEventListener("submit", (event) => {
  event.preventDefault();
  const message = input.value.trim();
  if (!message) return;
  input.value = "";
  autosizeInput();
  renderCommandHints();
  send(message);
});

input.addEventListener("input", () => {
  autosizeInput();
  renderCommandHints();
});

input.addEventListener("keydown", (event) => {
  if (event.key === "Enter" && !event.shiftKey && !event.isComposing) {
    event.preventDefault();
    form.requestSubmit();
    return;
  }
  if (event.key === "ArrowUp" && !input.value && sentMessages.length) {
    event.preventDefault();
    recallIndex = sentMessages.length - 1;
    input.value = sentMessages[recallIndex];
    autosizeInput();
    return;
  }
  if (event.key === "ArrowDown" && recallIndex !== null) {
    event.preventDefault();
    recallIndex += 1;
    if (recallIndex >= sentMessages.length) {
      recallIndex = null;
      input.value = "";
    } else {
      input.value = sentMessages[recallIndex];
    }
    autosizeInput();
  }
});

document.querySelectorAll("[data-command]").forEach((button) => {
  button.addEventListener("click", () => {
    const command = button.getAttribute("data-command");
    if (command) send(command);
  });
});

newSessionButton.addEventListener("click", startNewSession);
loadSessions().then(() => {
  if (querySessionId) {
    loadSession(querySessionId);
  }
});
</script>
{% endblock %}
